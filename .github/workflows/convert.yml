name: Windows Engine
on:
  repository_dispatch:
    types: [convert_etl]
  workflow_dispatch: # This allows you to click a button to test it!

jobs:
  convert:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Process File
        shell: pwsh
        run: |
          $etlUrl = "${{ github.event.client_payload.etl_url }}"
          $returnUrl = "${{ github.event.client_payload.return_url }}"
          $taskId = "${{ github.event.client_payload.task_id }}"
          
          Write-Host "Downloading from: $etlUrl"
          Invoke-WebRequest -Uri $etlUrl -OutFile "input.etl"
          
          Write-Host "Converting..."
          .\etl2pcapng.exe input.etl output.pcap
          
          Write-Host "Sending back to: $returnUrl"
          curl.exe -X POST -F "file=@output.pcap" -F "taskId=$taskId" $returnUrl
